site_name: pysenxor
repo_url: https://github.com/MeridianInnovation/pysenxor-lite
site_url: https://MeridianInnovation.github.io/pysenxor-lite
site_description: A Python Library for Meridian Innovation's thermal imaging devices.
site_author: Meridian Innovation
edit_uri: edit/main/docs/
repo_name: MeridianInnovation/pysenxor-lite
copyright: Maintained by <a href="https://www.meridianinno.com/">MeridianInnovation</a>.

nav:
  - Overview: index.md
  - Tutorials:
      - Connect Device: guides/1.connect_device.md
      - Basic Stream: guides/2.basic_stream.md
      - Data Processing: guides/3.data_processing.md
      - Device Control: guides/4.device_control.md
      - Logging: guides/5.logging.md
      - Loading Settings: guides/6.loading_settings.md
      - Error Handling: guides/7.error_handling.md
      - Advanced:
        - "Concurrency patterns for Senxor: multi-device streaming and blocking I/O": guides/advanced/1.concurrency_patterns.md
  - Examples:
      - Basic Stream: examples/basic_stream.md
      - Stream to Virtual Camera using FFmpeg and v4l2loopback: examples/v4l2-virtual-camera.md
  - API Reference:
      - senxor: api/senxor.md
      - senxor.proc: api/proc.md
      - senxor.utils: api/utils.md
      - senxor.error: api/error.md
      - senxor.log: api/log.md
      - senxor.settings: api/settings.md
      - senxor.cv_utils: api/cv_utils.md
      - senxor.interface.protocol: api/interface/protocol.md
      - senxor.interface.serial_port: api/interface/serial_port.md
      - senxor.interface.registry: api/interface/registry.md
      - senxor.regmap: api/regmap.md

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: ["senxor"]
          inventories:
            - https://docs.python.org/3/objects.inv

          options:
            inherited_members: true
            members_order: source
            group_by_category: true
            docstring_style: numpy
            parameter_headings: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 3
            show_source: false
            line_length: 88
            merge_init_into_class: true
            docstring_options:
              ignore_init_summary: true
            backlinks: tree
            docstring_section_style: table
            unwrap_annotated: true
            relative_crossrefs: true
            scoped_crossrefs: true
            signature_crossrefs: true

  - include-markdown

theme:
  name: material
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.instant.preview
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MeridianInnovation/pysenxor-lite
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pysenxor-lite
markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - admonition
